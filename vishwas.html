<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💐</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a0010 0%, #3d0020 40%, #1a000d 100%);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .center-text {
    position: relative;
    z-index: 10;
    text-align: center;
    animation: appear 1.5s cubic-bezier(0.22,1,0.36,1) 0.5s both;
  }

  @keyframes appear {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .hey {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 1.3rem;
    color: rgba(255,180,180,0.8);
    letter-spacing: 4px;
    margin-bottom: 0.3rem;
  }

  .main {
    font-family: 'Dancing Script', cursive;
    font-size: 4.2rem;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(255,80,100,0.7), 0 0 80px rgba(200,0,40,0.4);
    animation: glow 3s ease-in-out infinite alternate;
  }

  @keyframes glow {
    0% { text-shadow: 0 0 30px rgba(255,80,100,0.6), 0 0 70px rgba(200,0,40,0.3); }
    100% { text-shadow: 0 0 50px rgba(255,100,130,0.9), 0 0 100px rgba(220,0,60,0.6), 0 0 140px rgba(180,0,40,0.3); }
  }

  .cutie {
    font-family: 'Dancing Script', cursive;
    font-size: 3rem;
    color: #ffb0c0;
    text-shadow: 0 0 20px rgba(255,100,120,0.6);
    animation: glow 3s ease-in-out 1s infinite alternate;
  }

  .hearts {
    margin-top: 1rem;
    font-size: 1.6rem;
    letter-spacing: 8px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .rose {
    position: fixed;
    top: -120px;
    animation: fall linear infinite;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 4px 12px rgba(180,0,30,0.5));
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(var(--r0)) scale(var(--sc)); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(var(--r1)) scale(var(--sc)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="center-text">
  <div class="hey">hey sunna</div>
  <div class="main">ye apke liye</div>
  <div class="cutie">cutie 🌹</div>
  <div class="hearts">💕 🌹 💕</div>
</div>

<script>
  const ROSE_SVG = `
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <path d="M40 72 Q36 85 34 100" stroke="#2d6a2d" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M37 88 Q26 80 28 70 Q34 78 37 88Z" fill="#3a8a3a"/>
  <path d="M36 82 Q48 76 44 65 Q38 74 36 82Z" fill="#2d6a2d"/>
  <ellipse cx="40" cy="52" rx="18" ry="10" fill="#c0001e" transform="rotate(-30 40 52)"/>
  <ellipse cx="40" cy="52" rx="18" ry="10" fill="#b0001a" transform="rotate(10 40 52)"/>
  <ellipse cx="40" cy="52" rx="18" ry="10" fill="#c8002a" transform="rotate(50 40 52)"/>
  <ellipse cx="40" cy="52" rx="18" ry="10" fill="#a8001a" transform="rotate(90 40 52)"/>
  <ellipse cx="40" cy="52" rx="18" ry="10" fill="#be0022" transform="rotate(130 40 52)"/>
  <ellipse cx="40" cy="48" rx="13" ry="8" fill="#d4002e" transform="rotate(-15 40 48)"/>
  <ellipse cx="40" cy="48" rx="13" ry="8" fill="#cc0028" transform="rotate(30 40 48)"/>
  <ellipse cx="40" cy="48" rx="13" ry="8" fill="#d80030" transform="rotate(75 40 48)"/>
  <ellipse cx="40" cy="48" rx="13" ry="8" fill="#c40024" transform="rotate(120 40 48)"/>
  <ellipse cx="40" cy="44" rx="9" ry="6" fill="#e8003a" transform="rotate(0 40 44)"/>
  <ellipse cx="40" cy="44" rx="9" ry="6" fill="#e0003a" transform="rotate(45 40 44)"/>
  <ellipse cx="40" cy="44" rx="9" ry="6" fill="#ec003e" transform="rotate(90 40 44)"/>
  <ellipse cx="40" cy="44" rx="9" ry="6" fill="#e40036" transform="rotate(135 40 44)"/>
  <ellipse cx="40" cy="41" rx="5.5" ry="4" fill="#ff1a4a"/>
  <ellipse cx="40" cy="40" rx="3" ry="2.5" fill="#ff3a60"/>
</svg>`;

  const count = 38;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'rose';
    const sc = (0.55 + Math.random() * 0.85).toFixed(2);
    const left = (Math.random() * 102 - 1).toFixed(1) + 'vw';
    const dur = (5 + Math.random() * 9).toFixed(2) + 's';
    const delay = (Math.random() * 12).toFixed(2) + 's';
    const r0 = (Math.random() * 60 - 30).toFixed(1) + 'deg';
    const r1 = (Math.random() * 360 - 180).toFixed(1) + 'deg';
    el.style.cssText = `left:${left};--sc:${sc};--r0:${r0};--r1:${r1};animation-duration:${dur};animation-delay:${delay};`;
    el.innerHTML = ROSE_SVG;
    document.body.appendChild(el);
  }
</script>
</body>
</html>
